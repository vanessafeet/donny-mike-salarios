<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Administración</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:dodgerblue;
}

/* BOTON MENU */

.menu-btn{
font-size:26px;
cursor:pointer;
background:#111;
color:white;
border:none;
padding:10px 15px;
position:fixed;
top:10px;
left:10px;
z-index:1000;
border-radius:5px;
}

/* SIDEBAR */

.sidebar{
height:100%;
width:260px;
position:fixed;
left:0;
top:0;
background:#1e293b;
padding-top:60px;
transition:0.3s;
text-align:center;
}

/* FOTO CIRCULAR CON ESPACIO */

.profile-img{
width:100px;
height:100px;
border-radius:50%;
object-fit:cover;
border:4px solid white  ;
margin-top:20px;
margin-bottom:30px;
}

/* BOTONES */

.sidebar button{
display:block;
width:85%;
margin:12px auto;
padding:12px;
border:none;
border-radius:6px;
background:#334155;
color:white;
font-size:15px;
cursor:pointer;
}

.sidebar button:hover{
background:#475569;
}

/* CONTENIDO */

.content{
margin-left:260px;
padding:40px;
transition:0.3s;
text-align:center;
}

.content img{
max-width:400px;
width:100%;
border-radius:10px;
margin-top:20px;
}

/* MENU CERRADO */

.sidebar.closed{
width:0;
overflow:hidden;
}

.content.full{
margin-left:0;
}

/* MOVIL */

@media (max-width:768px){

.sidebar{
width:220px;
}

.content{
margin-left:0;
padding-top:60px;
}

}

</style>
</head>

<body>

<button class="menu-btn" onclick="toggleMenu()">☰</button>

<div id="sidebar" class="sidebar">

<img src="https://as1.ftcdn.net/jpg/01/91/36/22/1000_F_191362207_0KSZAWwNCckZl8j5GAz9c3QRFDpAkhVb.jpg" class="profile-img">

<button onclick="window.location.href='Donny-Mike.html'">
Consulta de los salarios de los jefes
</button>

<button onclick="window.location.href='jennifercas.html'">
Consulta del salario de Jennifer
</button>

</div>

<div id="content" class="content">

<h1>Panel de Administración</h1>
<p>Sistema de consulta de salarios</p>


</div>

<script>

function toggleMenu(){
document.getElementById("sidebar").classList.toggle("closed");
document.getElementById("content").classList.toggle("full");
}

</script>

</body>
</html>
